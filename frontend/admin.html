<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Configuración básica del documento -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Ícono del sitio web (favicon) -->
    <link rel="shortcut icon" type="image/x-icon" href="/logo.png">

    <!-- Fuente personalizada desde Google Fonts (Raleway) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- Enlace al archivo de estilos CSS principal para esta vista -->
    <link rel="stylesheet" href="./src/css/admin.css" />

    <!-- Título que aparece en la pestaña del navegador -->
    <title>Administrador</title>
</head>

<body>

    <!-- Encabezado del sitio con logo y menú de navegación -->
    <header>
        <div class="grupo-header">
            <div class="logo-y-subtitulo">
                <!-- Logo clickeable que redirige al inicio -->
                <a href="index.html">
                    <img src="logoB.png" width="80" alt="Logo SIGREC" />
                </a>
                <!-- Título del sistema -->
                <p class="subtitulo">SIGREC</p>
            </div>
        </div>

        <!-- Menú principal de navegación -->
        <nav class="menu">
            <a href="index.html">Inicio</a>
            <a href="/Consulta.html">Consulta</a>
            <a href="/Vendedor.html">Vendedor</a>
            <a href="/admin.html">Administrador</a>
        </nav>
    </header>

    <!-- Contenido principal -->
    <main>
        <div class="contenido">

            <!-- Formulario de inicio de sesión para el administrador -->
            <form class="formulario">
                <!-- Imagen de presentación (avatar u otra ilustración) -->
                <img src="/pp2.png" class="imgPP">

                <!-- Campo para ingresar el correo -->
                <input type="email" name="correo" id="correo" placeholder="Ingrese su correo electrónico" required />
                <br /> <br />

                <!-- Campo para ingresar la contraseña -->
                <input type="password" name="contra" id="contra" placeholder="Ingrese su contraseña" required />
                <br /> <br />

                <!-- Botón de enviar el formulario -->
                <input type="submit" value="Iniciar sesión" />
            </form>

            <!-- Enlace para recuperación de contraseña -->
            <div class="registro">
                <p>¿Olvidaste tu contraseña?</p>
                <a href="recuperarContra.html" class="reg">Recupérala aquí</a>
            </div>

        </div>
    </main>

    <!-- Script que controla el inicio de sesión del administrador -->
    <script>
        // Se ejecuta cuando se envía el formulario
        document.querySelector('.formulario').addEventListener('submit', async (e) => {
            e.preventDefault(); // Previene el envío por defecto del formulario

            // Obtiene los valores ingresados en los campos del formulario
            const correo = document.getElementById('correo').value;
            const contra = document.getElementById('contra').value;

            try {
                // Envía una solicitud POST a la API de inicio de sesión del administrador
                const res = await fetch('http://localhost:3000/api/loginV/admin', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ correo, contra }), // Se envían los datos como JSON
                });

                // Si la respuesta del servidor no es exitosa, muestra un mensaje de error
                if (!res.ok) {
                    const data = await res.json();
                    alert(data.mensaje || 'Error en el servidor');
                    return;
                }

                // Si la autenticación fue exitosa, se recibe el usuario
                const data = await res.json();

                // Se almacenan los datos del usuario en el localStorage
                localStorage.setItem('usuarioId', data.usuarioId);
                localStorage.setItem('correo', data.correo);
                localStorage.setItem('nombre', data.nombre);
                localStorage.setItem('nombreAdmin', data.nombre);
                localStorage.setItem('generoAdmin', data.genero);

                // Redirige al panel de administrador
                window.location.href = 'inicioAdmin.html';

            } catch (error) {
                // En caso de que la conexión falle, muestra un error
                console.error('Error en la conexión:', error);
                alert('No se pudo conectar con el servidor');
            }
        });
    </script>

</body>

</html>
