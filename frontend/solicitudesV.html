<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="whrefth=device-whrefth, initial-scale=1.0">
    <link rel="shortcut icon" type="image/x-icon" href="/logo.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <link rel="stylesheet" href="./src/css/solicitudesV.css" />
    <script src="./src/js/solicitudesV.js" defer></script>
    <title>Historial solicitudes</title>

</head>

<body>

    <div class="grid">

        <!-- Encabezado de la sección con título -->
        <header class="header">
            <div class="texto-header">
                <p class="subtitulo">Solicitudes</p>
            </div>
        </header>

        <!-- Navegación lateral con enlaces a otras páginas -->
        <nav class="nav">
            <a href="inicioVendedor.html">✎ Inicio</a><br />
            <a href="infoV.html">✎ Información</a>
            <a href="solicitudesGeneralesV.html" class="inicio">✎ Solicitudes</a>
            <a href="#" id="btnCerrarSesion">✎ Cerrar sesión</a>
        </nav>

        <!-- Contenido principal -->
        <main class="main">

            <!-- Navegación interna para diferentes acciones -->
            <div class="navI">
                <a href="CrearCuentaV.html">Nuevo vendedor</a>
                <a href="nuevaSolicitudV.html"> Renovar permiso</a>
                <a href="registrarProductoV.html">Registrar producto</a>
                <a href="solicitudesV.html">Historial</a>
            </div>

            <!-- Contenedor para mostrar historial de solicitudes -->
            <div class="info">
                <h2 class="encabezado">Historial de solicitudes</h2>
                <div class="datos" id="contenedorSolicitudes">
                    <!-- Aquí se cargarán las solicitudes del usuario -->
                </div>
            </div>

        </main>
    </div>

    <script>
        // Botón para cerrar sesión con confirmación
        document.getElementById('btnCerrarSesion').addEventListener('click', function (e) {
            e.preventDefault(); // Evita navegación automática al hacer clic

            const confirmar = confirm('¿Seguro que quieres cerrar sesión?');
            if (confirmar) {
                // Limpiar datos de sesión almacenados en localStorage
                localStorage.removeItem('usuarioId');
                localStorage.removeItem('vendedorId');

                // Redirigir al usuario a la página principal
                window.location.href = 'index.html';
            }
        });
    </script>

</body>
</html>
