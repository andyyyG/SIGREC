<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8"> 
    <meta name="viewport" content="whrefth=device-whrefth, initial-scale=1.0"> 
    <link rel="shortcut icon" type="image/x-icon" href="/logo.png"> <!-- Se agrega el ícono del sitio web -->

    <!-- Se optimiza la carga de fuentes desde Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">

    <!-- Se enlaza la hoja de estilos específica para esta página -->
    <link rel="stylesheet" href="./src/css/soliNuevosV.css" />

    <!-- Se enlaza el archivo JavaScript correspondiente -->
    <script src="./src/js/soliNuevosV.js" defer></script>

    <title>Solicitudes nuevos vendedores</title> <!-- Se establece el título de la pestaña -->
</head>

<body>
    <!-- Se estructura el contenido principal en una grilla -->
    <div class="grid">

        <!-- Sección de encabezado -->
        <header class="header">
            <div class="texto-header">
                <p class="subtitulo">Solicitudes</p> <!-- Se muestra el subtítulo en el encabezado -->
            </div>
        </header>

        <!-- Menú de navegación lateral -->
        <nav class="nav">
            <a href="inicioAdmin.html">✎ Inicio</a>
            <a href="solicitudesGeneralesA.html" class="inicio">✎ Solicitudes</a>
            <a href="consultasA.html">✎ Consultas</a>
            <a href="reportesA.html">✎ Reportes</a><br />
            <a href="cuentaA.html">✎ Cuenta</a>
            <a href="#" id="btnCerrarSesion">✎ Cerrar sesión</a> <!-- Botón para cerrar sesión -->
        </nav>

        <!-- Sección principal de la página -->
        <main class="main">

            <!-- Barra de navegación interna -->
            <div class="navI">
                <a href="soliNuevosV.html">Nuevos vendedores</a>
                <a href="soliRenovacionV.html">Renovación de permiso</a>
                <a href="soliProductosV.html">Productos</a>
                <a href="busquedaSoli.html">🔍 Buscar</a>
            </div>

            <!-- Contenido informativo -->
            <div class="info">
                <h2 class="encabezado">Solicitudes de nuevos vendedores</h2>

                <!-- Contenedor donde se cargarán dinámicamente las solicitudes -->
                <div class="datos" id="contenedorSolicitudes">
                </div>

            </div>
        </main>
    </div>

    <!-- Script para cerrar sesión -->
    <script>
        document.getElementById('btnCerrarSesion').addEventListener('click', function (e) {
            e.preventDefault(); // Se evita la acción por defecto del enlace

            const confirmar = confirm('¿Seguro que quieres cerrar sesión?');
            if (confirmar) {
                // Se eliminan los datos del almacenamiento local
                localStorage.removeItem('usuarioId');
                localStorage.removeItem('vendedorId');

                // Se redirige al usuario a la página de inicio
                window.location.href = 'index.html';
            }
        });
    </script>

</body>
</html>
